name: run

# Executes the example against the noiseless simulator on every push and
# weekly. If this workflow goes red, either the SDK contract drifted or
# the qass dispatcher is broken — both worth knowing immediately.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 6 * * 1"  # Mondays 06:17 UTC
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Hoist secret presence into an env var the `if:` expressions can
    # read. GitHub disallows referencing `secrets.*` directly in step-
    # level conditionals, so we project it to a sentinel here.
    env:
      HAS_CREDS: ${{ secrets.QDEVOPS_API_TOKEN != '' && secrets.QDEVOPS_PROJECT_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: |
          pip install ruff
          ruff check .

      # Skip cleanly on forks (which can't access org secrets in PR
      # workflows). Emit a workflow notice so the absence is visible in
      # the run summary if someone unsets the org secret by accident.
      - name: Skip notice (no credentials)
        if: env.HAS_CREDS != 'true'
        run: |
          echo "::notice title=Example not executed::QDEVOPS_API_TOKEN or QDEVOPS_PROJECT_ID secret is missing — the live run was skipped. Set them at the qdevops-io org level (or on this repo) to actually exercise the SDK->API->dispatcher path."

      - name: Run Bell example
        if: env.HAS_CREDS == 'true'
        env:
          QDEVOPS_API_TOKEN: ${{ secrets.QDEVOPS_API_TOKEN }}
          QDEVOPS_PROJECT_ID: ${{ secrets.QDEVOPS_PROJECT_ID }}
          QDEVOPS_BACKEND: simulator
          QDEVOPS_SHOTS: "4096"
        run: python bell.py
